name: Feature Request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: dropdown
    id: scope
    attributes:
      label: Feature Scope
      options:
        - New document type / parser
        - UI / UX improvement
        - Export / output enhancement
        - Performance optimization
        - Translation / i18n
        - Other
